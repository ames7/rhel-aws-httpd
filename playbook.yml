---
# RHEL 9.6 on AWS: launch EC2, install httpd, enable and start Apache.
#
# Prerequisites:
#   - Ansible collections: amazon.aws (ansible-galaxy collection install -r requirements.yml)
#   - AWS credentials (environment, profile, or instance role on the controller)
#   - An EC2 key pair in the target region (matches ssh_user on the instance, default ec2-user)
#
# Run (example):
#   ansible-playbook playbook.yml -e "key_name=my-key" -e "vpc_subnet_id=subnet-xxxxxxxx"
#
# Optional extra-vars:
#   region, instance_type, key_name (required unless AWS_KEY_PAIR_NAME is set on the EE),
#   vpc_subnet_id (omit to use the first mapPublicIpOnLaunch subnet in the default VPC),
#   assign_public_ip, security_group_ids (list), instance_name, allowed_ssh_cidr,
#   create_security_group, ssh_user (SSH login on the new EC2 host; default ec2-user),
#   ssh_private_key_file (optional path to PEM for the new host; else controller credential key is used)

- name: Discover RHEL 9.6 AMI and launch EC2
  hosts: localhost
  connection: local
  gather_facts: false
  vars:
    # Aliases: never use `name: "{{ name | default(...) }}"` — AAP/inventory can define the
    # same key and Ansible will recurse. Read only from extra-vars on the RHS.
    aws_region: "{{ region | default('us-east-2') }}"
    ec2_instance_type: "{{ instance_type | default('t3.micro') }}"
    ec2_instance_name: "{{ instance_name | default('rhel96-httpd-demo') }}"
    # Red Hat's AWS account for RHEL images (Marketplace / on-demand RHEL)
    rhel_owner: "309956199498"
    # Wildcard for official RHEL 9.6.x image names (often RHEL-9.6.0_HVM-...-x86_64-...).
    ami_name_pattern: "RHEL-9.6*"
    ec2_assign_public_ip: "{{ assign_public_ip | default(true) }}"
    ec2_create_security_group: "{{ create_security_group | default(true) }}"
    target_ssh_user: "{{ ssh_user | default('ec2-user') }}"

  tasks:
    - name: Find RHEL 9.6 x86_64 AMIs
      amazon.aws.ec2_ami_info:
        region: "{{ aws_region }}"
        owners: "{{ rhel_owner }}"
        filters:
          name: "{{ ami_name_pattern }}"
          architecture: x86_64
          state: available
      register: rhel_ami

    - name: Fail if no matching AMI was found
      ansible.builtin.assert:
        that:
          - rhel_ami.images | length > 0
        fail_msg: >-
          No AMI matched '{{ ami_name_pattern }}' for owner {{ rhel_owner }} in {{ aws_region }}.
          Confirm with: aws ec2 describe-images --owners {{ rhel_owner }} --filters Name=name,Values='RHEL-9.6*' --region {{ aws_region }}
          (GovCloud uses a different owner ID.)

    - name: Choose newest AMI by creation date
      ansible.builtin.set_fact:
        rhel_ami_chosen: "{{ rhel_ami.images | sort(attribute='creation_date') | last }}"

    - name: Set AMI id fact
      ansible.builtin.set_fact:
        rhel_ami_id: "{{ rhel_ami_chosen.image_id }}"

    - name: Create security group for SSH and HTTP (optional)
      when: ec2_create_security_group | bool
      amazon.aws.ec2_security_group:
        region: "{{ aws_region }}"
        name: "{{ ec2_instance_name }}-sg"
        description: "SSH + HTTP for {{ ec2_instance_name }}"
        rules:
          - proto: tcp
            ports: 22
            cidr_ip: "{{ allowed_ssh_cidr | default('0.0.0.0/0') }}"
            rule_desc: SSH
          - proto: tcp
            ports: 80
            cidr_ip: 0.0.0.0/0
            rule_desc: HTTP
        rules_egress:
          - proto: all
            cidr_ip: 0.0.0.0/0
      register: new_sg

    - name: Require existing security groups when not creating one
      when: not (ec2_create_security_group | bool)
      ansible.builtin.assert:
        that:
          - security_group_ids is defined
          - security_group_ids | length > 0
        fail_msg: >-
          When create_security_group=false, pass security_group_ids (list of SG ids) that allow SSH from this host.

    - name: Use vpc_subnet_id from extra variables when set
      ansible.builtin.set_fact:
        resolved_subnet_id: "{{ vpc_subnet_id | trim }}"
      when:
        - vpc_subnet_id is defined
        - (vpc_subnet_id | trim | length) > 0

    - name: Find default VPC (subnet auto-discovery)
      amazon.aws.ec2_vpc_net_info:
        region: "{{ aws_region }}"
        filters:
          is-default: "true"
      register: default_vpc
      when: resolved_subnet_id is not defined

    - name: Fail if no default VPC for subnet discovery
      ansible.builtin.assert:
        that:
          - default_vpc.vpcs | length > 0
        fail_msg: >-
          No default VPC in {{ aws_region }}. Set job template extra variable vpc_subnet_id to a subnet id.
      when: resolved_subnet_id is not defined

    - name: Find mapPublicIpOnLaunch subnets in default VPC
      amazon.aws.ec2_vpc_subnet_info:
        region: "{{ aws_region }}"
        filters:
          vpc-id: "{{ default_vpc.vpcs[0].vpc_id }}"
          map-public-ip-on-launch: "true"
      register: public_subnets
      when: resolved_subnet_id is not defined

    - name: Select first public subnet in default VPC
      ansible.builtin.set_fact:
        resolved_subnet_id: "{{ (public_subnets.subnets | sort(attribute='availability_zone'))[0].subnet_id }}"
      when:
        - resolved_subnet_id is not defined
        - public_subnets.subnets | default([]) | length > 0

    - name: Fail if subnet could not be resolved
      ansible.builtin.assert:
        that:
          - resolved_subnet_id is defined
          - resolved_subnet_id | length > 0
        fail_msg: >-
          Set vpc_subnet_id on the job template, or ensure the default VPC has a subnet with public IP auto-assign.

    - name: Resolve EC2 key pair name from extra-var or env
      ansible.builtin.set_fact:
        resolved_key_name: >-
          {{
            (key_name | default(lookup('env', 'AWS_KEY_PAIR_NAME', default=''), true))
            | trim
          }}

    - name: List EC2 key pairs in region (when name not yet resolved)
      amazon.aws.ec2_key_info:
        region: "{{ aws_region }}"
      register: ec2_keys
      when: resolved_key_name | length == 0

    - name: Use the only key pair in the region when none was specified
      ansible.builtin.set_fact:
        resolved_key_name: "{{ ec2_keys.keypairs[0].key_name }}"
      when:
        - resolved_key_name | length == 0
        - ec2_keys is not skipped
        - ec2_keys.keypairs | length == 1

    - name: Fail if EC2 key pair name is not set
      ansible.builtin.assert:
        that:
          - resolved_key_name | length > 0
        fail_msg: >-
          Set job template extra variable key_name to an existing EC2 key pair in {{ aws_region }},
          set AWS_KEY_PAIR_NAME on the execution environment, or ensure exactly one key pair exists in the account.

    - name: Launch RHEL 9.6 instance
      amazon.aws.ec2_instance:
        region: "{{ aws_region }}"
        name: "{{ ec2_instance_name }}"
        key_name: "{{ resolved_key_name }}"
        vpc_subnet_id: "{{ resolved_subnet_id }}"
        instance_type: "{{ ec2_instance_type }}"
        image_id: "{{ rhel_ami_id }}"
        wait: true
        state: running
        network:
          assign_public_ip: "{{ ec2_assign_public_ip }}"
        security_groups: >-
          {{
            (security_group_ids | default([]))
            + ([new_sg.group_id] if (ec2_create_security_group | bool) else [])
          }}
        tags:
          Name: "{{ ec2_instance_name }}"
          ManagedBy: ansible
      register: ec2

    - name: Pick instance public or private IP for Ansible
      ansible.builtin.set_fact:
        target_host_ip: >-
          {{
            (ec2.instances[0].public_ip_address | default(''))
            or (ec2.instances[0].private_ip_address | default(''))
          }}

    - name: Fail if instance has no usable IP (check subnet / public IP settings)
      ansible.builtin.assert:
        that:
          - target_host_ip | length > 0
        fail_msg: >-
          Instance launched but no IP was returned. If you need SSH from outside the VPC,
          set assign_public_ip=true or use a bastion and private connectivity.

    - name: Add new instance to ad hoc inventory group
      ansible.builtin.add_host:
        name: "{{ target_host_ip }}"
        groups: rhel_launched
        ansible_user: "{{ target_ssh_user }}"
        ansible_ssh_private_key_file: >-
          {{ ssh_private_key_file | default(ansible_ssh_private_key_file | default(omit), true) }}
        ansible_python_interpreter: /usr/bin/python3

- name: Install httpd and start Apache on the new host
  hosts: rhel_launched
  gather_facts: false
  become: true

  tasks:
    - name: Wait until SSH is reachable
      ansible.builtin.wait_for_connection:
        timeout: 300
        delay: 10

    - name: Gather facts after SSH is up
      ansible.builtin.setup:

    - name: Install Apache (httpd)
      ansible.builtin.dnf:
        name: httpd
        state: present

    - name: Enable and start httpd
      ansible.builtin.service:
        name: httpd
        state: started
        enabled: true

    - name: Show endpoint hint
      ansible.builtin.debug:
        msg: "Apache should respond on http://{{ inventory_hostname }}/ (ensure SG allows 80 from your client)."
