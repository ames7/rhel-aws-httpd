# Minimal main config for automation demos. Replaces package default when deployed by playbook.
# Keeps module snippets and conf.d includes so RHEL httpd extras (e.g. ssl.conf) still load.

ServerRoot "/etc/httpd"
Listen 80
Include conf.modules.d/*.conf
IncludeOptional conf.d/*.conf

User apache
Group apache

<Directory />
    AllowOverride none
    Require all denied
</Directory>

DocumentRoot "/var/www/html"

<Directory "/var/www/html">
    AllowOverride None
    Require all granted
</Directory>
